# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/strydeeva?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=projectuser
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload (max 6 images + return video)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# CORS handled in WebConfig

# Notification / mail
app.notification.admin-email=support@strydeeva.com
app.notification.contact-email=Contact@strydeeva.com
app.notification.support-email=support@strydeeva.com
# Local file storage for return videos
app.upload.returns-dir=uploads/returns
# Frontend base URL for payment redirects
app.frontend.base-url=https://strydeeva.com
# Public backend base URL (must be reachable by Easebuzz in prod)
app.backend.base-url=https://strydeeva.com

# Easebuzz payment gateway
# NOTE: keep SALT secret; do not expose in frontend.
easebuzz.env=prod
easebuzz.key=WA3TF16W6J
easebuzz.salt=Q9LSZAHHLZ
# Configure SMTP (Google Workspace SMTP Relay — no app password)
# 1) In Google Admin Console → Apps → Google Workspace → Gmail → Routing → SMTP relay service:
#    - Allowlist your server public IP, and set "Only accept mail from these IP addresses"
#    - Allowed senders: only addresses in your domain (strydeeva.com)
# 2) Then enable these properties:
spring.mail.host=smtp-relay.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=true
